name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check-prerequisites:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check_merge.outputs.should_skip }}
    steps:
      - name: Check if triggered by merge commit
        id: check_merge
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'push') {
              core.setOutput('should_skip', 'false');
              return;
            }
            const commit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });
            const isMerge = commit.data.parents.length > 1;
            const message = commit.data.commit.message;
            const isUpstreamSync = message.includes("Merge remote-tracking branch 'upstream/");
            if (isMerge && isUpstreamSync) {
              console.log('Triggered by upstream sync merge commit, skipping to prevent loop');
              core.setOutput('should_skip', 'true');
            } else {
              core.setOutput('should_skip', 'false');
            }

  build-and-deploy:
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check if fork
        id: check_fork
        uses: actions/github-script@v7
        with:
          script: |
            const repo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            return repo.data.fork;

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TEMPLATE_PAT || github.token }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

      - name: Sync with upstream
        id: sync_fork
        if: steps.check_fork.outputs.result == 'true'
        run: |
          echo "sync_happened=false" >> $GITHUB_OUTPUT
          git remote add upstream https://github.com/OrderlyNetworkDexCreator/dex-creator-template.git || true
          git fetch upstream
          
          BEFORE_MERGE=$(git rev-parse HEAD)
          
          if git merge upstream/main --no-edit; then
            AFTER_MERGE=$(git rev-parse HEAD)
            
            if [ "$BEFORE_MERGE" != "$AFTER_MERGE" ]; then
              echo "Successfully merged upstream changes"
              echo "sync_happened=true" >> $GITHUB_OUTPUT
              git push origin main
            else
              echo "Already up to date with upstream"
            fi
          else
            echo "Merge failed"
            git merge --abort 2>/dev/null || true
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: |
            yarn.lock

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.yarn/cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Check if only config changed
        id: check-changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "Manual trigger detected - forcing full build"
          elif [ "${{ steps.sync_fork.outputs.sync_happened }}" = "true" ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "Fork sync happened - forcing full build"
          elif git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q -v "^public/config\.js$"; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Extract repository name
        run: echo "REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)" >> $GITHUB_ENV

      - name: Check for custom domain
        id: check-custom-domain
        run: |
          if [ -f "CNAME" ]; then
            DOMAIN=$(cat CNAME | tr -d '[:space:]')
            echo "has_custom_domain=true" >> $GITHUB_OUTPUT
            echo "domain=${DOMAIN}" >> $GITHUB_OUTPUT
            echo "Found custom domain: ${DOMAIN}"
          else
            echo "has_custom_domain=false" >> $GITHUB_OUTPUT
            echo "No custom domain configured"
          fi

      - name: Restore previous build (if only config changed)
        if: steps.check-changes.outputs.needs_build == 'false'
        uses: actions/cache/restore@v4
        with:
          path: ./build
          key: ${{ runner.os }}-build-${{ github.repository }}
          restore-keys: |
            ${{ runner.os }}-build-${{ github.repository }}
        continue-on-error: true

      - name: Check if build directory exists
        if: steps.check-changes.outputs.needs_build == 'false'
        run: |
          if [ -d "./build" ] && [ "$(ls -A ./build)" ]; then
            echo "Build directory found with content"
          else
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "Build directory empty or missing, forcing full build"
          fi
        id: force-build

      - name: Install dependencies
        if: steps.check-changes.outputs.needs_build == 'true' || steps.force-build.outputs.needs_build == 'true'
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Build with repository base path
        if: ${{ steps.check-custom-domain.outputs.has_custom_domain == 'false' && (steps.check-changes.outputs.needs_build == 'true' || steps.force-build.outputs.needs_build == 'true') }}
        run: yarn build:spa
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          # Set the base path for GitHub Pages using repo name
          PUBLIC_PATH: /${{ env.REPO_NAME }}/
          # Also set it as VITE environment variables
          VITE_PUBLIC_PATH: /${{ env.REPO_NAME }}/
          VITE_BASE_URL: /${{ env.REPO_NAME }}

      - name: Build with root base path (for custom domain)
        if: ${{ steps.check-custom-domain.outputs.has_custom_domain == 'true' && (steps.check-changes.outputs.needs_build == 'true' || steps.force-build.outputs.needs_build == 'true') }}
        run: yarn build:spa
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          # For custom domains, use root path
          PUBLIC_PATH: /
          VITE_PUBLIC_PATH: /
          VITE_BASE_URL: ""

      - name: Copy updated config to build (if using cached build)
        if: steps.check-changes.outputs.needs_build == 'false' && steps.force-build.outputs.needs_build != 'true'
        run: |
          cp public/config.js ./build/client/config.js
          echo "✅ Updated config.js copied to build output"

      - name: Copy CNAME to build output
        if: steps.check-custom-domain.outputs.has_custom_domain == 'true'
        run: |
          cp CNAME ./build/client/CNAME
          echo "✅ CNAME file copied to build output: ${{ steps.check-custom-domain.outputs.domain }}"

      - name: Cache build artifacts
        if: steps.check-changes.outputs.needs_build == 'true' || steps.force-build.outputs.needs_build == 'true'
        uses: actions/cache/save@v4
        with:
          path: ./build
          key: ${{ runner.os }}-build-${{ github.repository }}-${{ github.sha }}

      - name: Verify DNS configuration
        id: verify-dns
        if: steps.check-custom-domain.outputs.has_custom_domain == 'true'
        run: |
          DOMAIN="${{ steps.check-custom-domain.outputs.domain }}"
          echo "Checking DNS for ${DOMAIN}..."
          if command -v dig >/dev/null 2>&1; then
            RESOLVED=$(dig +short "${DOMAIN}" A 2>/dev/null)
            CNAME_TARGET=$(dig +short "${DOMAIN}" CNAME 2>/dev/null | sed 's/\.$//')
          else
            RESOLVED=$(nslookup "${DOMAIN}" 2>/dev/null | grep 'Address:' | tail -n +2 | awk '{print $2}')
            CNAME_TARGET=""
          fi
          GITHUB_PAGES_IPS="185.199.108.153 185.199.109.153 185.199.110.153 185.199.111.153"
          DNS_OK=false
          for ip in $RESOLVED; do
            for ghip in $GITHUB_PAGES_IPS; do
              if [ "$ip" = "$ghip" ]; then DNS_OK=true; fi
            done
          done
          if [ "$CNAME_TARGET" = "xsunn3.github.io" ]; then DNS_OK=true; fi
          # Always write an explicit true/false so the output is never empty
          if [ "$DNS_OK" = "true" ]; then
            echo "dns_ok=true" >> $GITHUB_OUTPUT
          else
            echo "dns_ok=false" >> $GITHUB_OUTPUT
          fi
          echo "cname_target=${CNAME_TARGET}" >> $GITHUB_OUTPUT
          if [ "$DNS_OK" = "true" ]; then
            echo "✅ DNS for ${DOMAIN} is correctly pointing to GitHub Pages"
            echo "## ✅ DNS OK: ${DOMAIN} → GitHub Pages (xsunn3)" >> $GITHUB_STEP_SUMMARY
            echo "Your perp DEX (broker: virgos, chain: Base) is live at https://${DOMAIN}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  DNS for ${DOMAIN} does not point to GitHub Pages (current CNAME: '${CNAME_TARGET:-<not set>}')."
            echo ""
            echo "   ── DEPLOYMENT OPTIONS ──────────────────────────────────────────"
            echo ""
            echo "   OPTION A — Use Vercel (recommended if DNS points to Vercel):"
            echo "     1. Import https://github.com/xsunn3/virgos-0077 in vercel.com/new"
            echo "     2. Add trade.virgos.ai as a custom domain in Vercel project settings"
            echo "     3. Update DNS at your registrar:"
            echo "          Type : CNAME"
            echo "          Name : trade"
            echo "          Value: cname.vercel-dns.com"
            echo "          TTL  : Auto"
            echo ""
            echo "   OPTION B — Use GitHub Pages (if you prefer GitHub Pages):"
            echo "     1. At your domain registrar, change the DNS record to:"
            echo "          Type : CNAME"
            echo "          Name : trade"
            echo "          Value: xsunn3.github.io"
            echo "          TTL  : 3600 (or Automatic)"
            echo "     2. Wait up to 24h for DNS propagation"
            echo "     3. Re-run this workflow — GitHub will then provision the SSL cert"
            echo ""
            echo "   ─────────────────────────────────────────────────────────────────"
            echo ""
            echo "   The GitHub Pages build was deployed successfully and will serve"
            echo "   your DEX once DNS is updated to point to xsunn3.github.io."
            {
              echo "## ⚠️ DNS not pointing to GitHub Pages for ${DOMAIN}"
              echo ""
              echo "Current DNS CNAME value: \`${CNAME_TARGET:-<not set>}\`"
              echo ""
              echo "The GitHub Pages build deployed successfully. To make ${DOMAIN} show your DEX, choose one option:"
              echo ""
              echo "### Option A — Vercel (recommended if your DNS already points to Vercel)"
              echo "1. Import [xsunn3/virgos-0077](https://github.com/xsunn3/virgos-0077) in [vercel.com/new](https://vercel.com/new)"
              echo "2. Add \`trade.virgos.ai\` as a custom domain in Vercel project settings"
              echo "3. Set DNS CNAME: \`trade → cname.vercel-dns.com\`"
              echo ""
              echo "### Option B — GitHub Pages"
              echo "Set DNS CNAME at your registrar: \`trade → xsunn3.github.io\` — then re-run this workflow."
            } >> $GITHUB_STEP_SUMMARY
          fi

      - name: Setup Pages
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TEMPLATE_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              const site = await github.rest.repos.getPages({ owner, repo });
              const source = site.data.source;
              console.log('✅ GitHub Pages already configured, source:', JSON.stringify(source));
              // If Pages is configured but not using gh-pages branch, switch it
              if (source && source.branch !== 'gh-pages') {
                try {
                  await github.rest.repos.updateInformationAboutPagesSite({
                    owner, repo,
                    source: { branch: 'gh-pages', path: '/' }
                  });
                  console.log('✅ Updated Pages source to gh-pages branch');
                } catch (updateErr) {
                  core.warning(`Could not update Pages source: ${updateErr.message}`);
                }
              }
            } catch (getErr) {
              console.log('Pages not configured yet, attempting to enable...');
              try {
                await github.rest.repos.createPagesSite({
                  owner, repo,
                  source: { branch: 'gh-pages', path: '/' }
                });
                console.log('✅ GitHub Pages enabled (gh-pages branch)');
              } catch (createErr) {
                core.warning(
                  `Could not enable Pages automatically: ${createErr.message}\n` +
                  'ACTION REQUIRED: Please enable GitHub Pages manually at:\n' +
                  `  https://github.com/${owner}/${repo}/settings/pages\n` +
                  '  → Source: Deploy from a branch → Branch: gh-pages → /(root)\n' +
                  'This is a one-time setup. Future deploys will update automatically.'
                );
              }
            }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./build/client
          token: ${{ secrets.TEMPLATE_PAT || github.token }}
          clean: true
          force: false

      - name: Configure custom domain and enforce HTTPS
        if: steps.check-custom-domain.outputs.has_custom_domain == 'true' && steps.verify-dns.outputs.dns_ok == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TEMPLATE_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const domain = '${{ steps.check-custom-domain.outputs.domain }}';

            // Step 1: Set Pages source to gh-pages branch AND custom domain in one call
            try {
              await github.rest.repos.updateInformationAboutPagesSite({
                owner,
                repo,
                source: { branch: 'gh-pages', path: '/' },
                cname: domain
              });
              console.log(`✅ GitHub Pages source set to gh-pages branch and custom domain set to: ${domain}`);
            } catch (error) {
              // Some API versions don't accept source + cname together; fall back to separate calls
              core.warning(`Combined source+cname update failed (${error.message}), trying separately...`);
              try {
                await github.rest.repos.updateInformationAboutPagesSite({ owner, repo, source: { branch: 'gh-pages', path: '/' } });
                console.log('✅ GitHub Pages source set to gh-pages branch');
              } catch (e) {
                core.warning(`Could not set Pages source: ${e.message}`);
              }
              try {
                await github.rest.repos.updateInformationAboutPagesSite({ owner, repo, cname: domain });
                console.log(`✅ GitHub Pages custom domain set to: ${domain}`);
              } catch (e) {
                core.warning(
                  `Could not set custom domain via API: ${e.message}\n` +
                  `ACTION REQUIRED: In GitHub → Settings → Pages:\n` +
                  `  1. Set "Custom domain" to: ${domain}\n` +
                  `  2. Click Save`
                );
              }
            }

            // Step 2: Poll for SSL certificate provisioning (up to ~10 minutes)
            // GitHub Pages provisions the cert automatically once DNS is correct and the
            // custom domain is saved. We must NOT enforce HTTPS before the cert is approved,
            // or browsers that remember the HSTS header will show ERR_CERT_COMMON_NAME_INVALID.
            console.log('Checking SSL certificate state for ' + domain + '...');
            let certApproved = false;
            const maxWaitMinutes = 10;
            const delayMs        = 30000; // 30 seconds between polls
            const maxAttempts    = Math.ceil((maxWaitMinutes * 60) / (delayMs / 1000));
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              try {
                const pages = await github.rest.repos.getPages({ owner, repo });
                const cert  = pages.data.https_certificate;
                const state = cert ? cert.state : 'unknown';
                console.log(`  Attempt ${attempt}/${maxAttempts}: certificate state = ${state}`);
                if (state === 'approved') {
                  certApproved = true;
                  console.log('✅ SSL certificate is approved.');
                  break;
                }
                if (state === 'error' || state === 'bad_authz') {
                  core.warning(
                    `SSL certificate is in error state "${state}" for ${domain}.\n` +
                    `This usually means DNS has not propagated yet or the CNAME record is missing.\n` +
                    `Verify that the following DNS record exists at your registrar:\n` +
                    `  Type : CNAME\n` +
                    `  Name : trade\n` +
                    `  Value: xsunn3.github.io\n` +
                    `DNS propagation can take up to 24 hours. Re-run this workflow after DNS propagates.`
                  );
                  break;
                }
              } catch (e) {
                console.log(`  Attempt ${attempt}/${maxAttempts}: could not read Pages info (${e.message})`);
              }
              if (attempt < maxAttempts) {
                console.log(`  Waiting 30 s before next check...`);
                await new Promise(r => setTimeout(r, delayMs));
              }
            }

            // Step 3: Enforce HTTPS only when the certificate is approved
            if (certApproved) {
              try {
                await github.rest.repos.updateInformationAboutPagesSite({
                  owner,
                  repo,
                  https_enforced: true
                });
                console.log('✅ HTTPS enforcement enabled');
                core.summary.addRaw(`## ✅ HTTPS enforced for ${domain}\nThe SSL certificate is approved and HTTPS is now enforced.`);
                await core.summary.write();
              } catch (error) {
                core.warning(`Could not enable HTTPS enforcement: ${error.message}`);
              }
            } else {
              core.warning(
                `SSL certificate for ${domain} is not yet approved.\n` +
                `HTTPS enforcement has NOT been enabled to avoid ERR_CERT_COMMON_NAME_INVALID errors.\n` +
                `\n` +
                `Once DNS propagates and GitHub provisions the certificate (usually within 24 hours),\n` +
                `re-run this workflow from the Actions tab → "Run workflow" to enable HTTPS enforcement.`
              );
              {
                const summary = [
                  `## ⚠️ SSL certificate not yet approved for ${domain}`,
                  ``,
                  `HTTPS enforcement was **not** enabled because the certificate is still being provisioned.`,
                  `This prevents the \`ERR_CERT_COMMON_NAME_INVALID\` + HSTS error in browsers.`,
                  ``,
                  `**What to do:**`,
                  `1. Confirm your DNS record at your registrar:`,
                  `   | Field | Value |`,
                  `   |-------|-------|`,
                  `   | Type  | CNAME |`,
                  `   | Name  | \`trade\` |`,
                  `   | Value | \`xsunn3.github.io\` |`,
                  `2. Wait up to 24 hours for DNS propagation.`,
                  `3. Re-run the **Deploy to GitHub Pages** workflow once propagation is complete.`,
                ].join('\n');
                core.summary.addRaw(summary);
                await core.summary.write();
              }
            }


  deploy-to-vercel:
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check Vercel secrets
        id: check-secrets
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "secrets_available=true" >> $GITHUB_OUTPUT
            echo "✅ Vercel secrets are configured — proceeding with Vercel deployment."
          else
            echo "secrets_available=false" >> $GITHUB_OUTPUT
            echo "⚠️  Vercel secrets are not fully configured — skipping Vercel deployment."
            echo ""
            echo "To enable automatic Vercel deployments on every push, add the following"
            echo "secrets to this repository (Settings → Secrets and variables → Actions):"
            echo "  VERCEL_TOKEN      – your Vercel API token (vercel.com/account/tokens)"
            echo "  VERCEL_ORG_ID     – your Vercel team/personal account ID"
            echo "  VERCEL_PROJECT_ID – the Vercel project ID for this repository"
          fi

      - name: Checkout
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check-secrets.outputs.secrets_available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel project configuration
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        if: steps.check-secrets.outputs.secrets_available == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Deploy to Vercel
        if: steps.check-secrets.outputs.secrets_available == 'true'
        id: vercel-deploy
        run: |
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --prod --no-clipboard --token=${{ secrets.VERCEL_TOKEN }})
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -E '^https://' | tail -1)
          if [ -z "$DEPLOY_URL" ]; then
            echo "❌ Vercel deployment failed or returned no URL. Full output:" >&2
            echo "$DEPLOY_OUTPUT" >&2
            exit 1
          fi
          echo "deploy_url=${DEPLOY_URL}" >> $GITHUB_OUTPUT
          echo "## ✅ Vercel Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Production URL: ${DEPLOY_URL}" >> $GITHUB_STEP_SUMMARY
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
