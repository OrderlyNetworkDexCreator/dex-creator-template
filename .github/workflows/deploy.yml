name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check-prerequisites:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check_merge.outputs.should_skip }}
    steps:
      - name: Check if triggered by merge commit
        id: check_merge
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'push') {
              core.setOutput('should_skip', 'false');
              return;
            }
            const commit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });
            const isMerge = commit.data.parents.length > 1;
            const message = commit.data.commit.message;
            const isUpstreamSync = message.includes("Merge remote-tracking branch 'upstream/");
            if (isMerge && isUpstreamSync) {
              console.log('Triggered by upstream sync merge commit, skipping to prevent loop');
              core.setOutput('should_skip', 'true');
            } else {
              core.setOutput('should_skip', 'false');
            }

  build-and-deploy:
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should_skip != 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check if fork
        id: check_fork
        uses: actions/github-script@v7
        with:
          script: |
            const repo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            return repo.data.fork;

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TEMPLATE_PAT || github.token }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'

      - name: Sync with upstream
        id: sync_fork
        if: steps.check_fork.outputs.result == 'true'
        run: |
          echo "sync_happened=false" >> $GITHUB_OUTPUT
          git remote add upstream https://github.com/OrderlyNetworkDexCreator/dex-creator-template.git || true
          git fetch upstream
          
          BEFORE_MERGE=$(git rev-parse HEAD)
          
          if git merge upstream/main --no-edit; then
            AFTER_MERGE=$(git rev-parse HEAD)
            
            if [ "$BEFORE_MERGE" != "$AFTER_MERGE" ]; then
              echo "Successfully merged upstream changes"
              echo "sync_happened=true" >> $GITHUB_OUTPUT
              git push origin main
            else
              echo "Already up to date with upstream"
            fi
          else
            echo "Merge failed"
            git merge --abort 2>/dev/null || true
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: |
            yarn.lock

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.yarn/cache
          key: ${{ runner.os }}-deps-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Check if only config changed
        id: check-changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "Manual trigger detected - forcing full build"
          elif [ "${{ steps.sync_fork.outputs.sync_happened }}" = "true" ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "Fork sync happened - forcing full build"
          elif git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q -v "^public/config\.js$"; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Extract repository name
        run: echo "REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)" >> $GITHUB_ENV

      - name: Check for custom domain
        id: check-custom-domain
        run: |
          if [ -f "CNAME" ]; then
            DOMAIN=$(cat CNAME | tr -d '[:space:]')
            echo "has_custom_domain=true" >> $GITHUB_OUTPUT
            echo "domain=${DOMAIN}" >> $GITHUB_OUTPUT
            echo "Found custom domain: ${DOMAIN}"
          else
            echo "has_custom_domain=false" >> $GITHUB_OUTPUT
            echo "No custom domain configured"
          fi

      - name: Restore previous build (if only config changed)
        if: steps.check-changes.outputs.needs_build == 'false'
        uses: actions/cache/restore@v4
        with:
          path: ./build
          key: ${{ runner.os }}-build-${{ github.repository }}
          restore-keys: |
            ${{ runner.os }}-build-${{ github.repository }}
        continue-on-error: true

      - name: Check if build directory exists
        if: steps.check-changes.outputs.needs_build == 'false'
        run: |
          if [ -d "./build" ] && [ "$(ls -A ./build)" ]; then
            echo "Build directory found with content"
          else
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "Build directory empty or missing, forcing full build"
          fi
        id: force-build

      - name: Install dependencies
        if: steps.check-changes.outputs.needs_build == 'true' || steps.force-build.outputs.needs_build == 'true'
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Build with repository base path
        if: ${{ steps.check-custom-domain.outputs.has_custom_domain == 'false' && (steps.check-changes.outputs.needs_build == 'true' || steps.force-build.outputs.needs_build == 'true') }}
        run: yarn build:spa
        env:
          # Set the base path for GitHub Pages using repo name
          PUBLIC_PATH: /${{ env.REPO_NAME }}/
          # Also set it as VITE environment variables
          VITE_PUBLIC_PATH: /${{ env.REPO_NAME }}/
          VITE_BASE_URL: /${{ env.REPO_NAME }}

      - name: Build with root base path (for custom domain)
        if: ${{ steps.check-custom-domain.outputs.has_custom_domain == 'true' && (steps.check-changes.outputs.needs_build == 'true' || steps.force-build.outputs.needs_build == 'true') }}
        run: yarn build:spa
        env:
          # For custom domains, use root path
          PUBLIC_PATH: /
          VITE_PUBLIC_PATH: /
          VITE_BASE_URL: ""

      - name: Copy updated config to build (if using cached build)
        if: steps.check-changes.outputs.needs_build == 'false' && steps.force-build.outputs.needs_build != 'true'
        run: |
          cp public/config.js ./build/client/config.js
          echo "✅ Updated config.js copied to build output"

      - name: Copy CNAME to build output
        if: steps.check-custom-domain.outputs.has_custom_domain == 'true'
        run: |
          cp CNAME ./build/client/CNAME
          echo "✅ CNAME file copied to build output: ${{ steps.check-custom-domain.outputs.domain }}"

      - name: Cache build artifacts
        if: steps.check-changes.outputs.needs_build == 'true' || steps.force-build.outputs.needs_build == 'true'
        uses: actions/cache/save@v4
        with:
          path: ./build
          key: ${{ runner.os }}-build-${{ github.repository }}-${{ github.sha }}

      - name: Verify DNS configuration
        if: steps.check-custom-domain.outputs.has_custom_domain == 'true'
        run: |
          DOMAIN="${{ steps.check-custom-domain.outputs.domain }}"
          echo "Checking DNS for ${DOMAIN}..."
          if command -v dig >/dev/null 2>&1; then
            RESOLVED=$(dig +short "${DOMAIN}" A 2>/dev/null)
            CNAME_TARGET=$(dig +short "${DOMAIN}" CNAME 2>/dev/null | sed 's/\.$//')
          else
            RESOLVED=$(nslookup "${DOMAIN}" 2>/dev/null | grep 'Address:' | tail -n +2 | awk '{print $2}')
            CNAME_TARGET=""
          fi
          GITHUB_PAGES_IPS="185.199.108.153 185.199.109.153 185.199.110.153 185.199.111.153"
          DNS_OK=false
          for ip in $RESOLVED; do
            for ghip in $GITHUB_PAGES_IPS; do
              if [ "$ip" = "$ghip" ]; then DNS_OK=true; fi
            done
          done
          if [ "$CNAME_TARGET" = "xsunn3.github.io" ]; then DNS_OK=true; fi
          if [ "$DNS_OK" = "true" ]; then
            echo "✅ DNS for ${DOMAIN} is correctly pointing to GitHub Pages"
          else
            echo "⚠️  DNS WARNING: ${DOMAIN} does not appear to point to GitHub Pages."
            echo ""
            echo "   To fix the ERR_CERT_COMMON_NAME_INVALID SSL error, add the following"
            echo "   DNS record at your domain registrar:"
            echo ""
            echo "   Type : CNAME"
            echo "   Name : trade"
            echo "   Value: xsunn3.github.io"
            echo "   TTL  : 3600 (or Automatic)"
            echo ""
            echo "   GitHub Pages can only provision an SSL certificate for ${DOMAIN}"
            echo "   once the DNS is pointed here. The deployment will continue, but"
            echo "   HTTPS will not work until DNS is updated."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          token: ${{ secrets.TEMPLATE_PAT || github.token }}
          enablement: true
          custom_domain: ${{ steps.check-custom-domain.outputs.has_custom_domain == 'true' && steps.check-custom-domain.outputs.domain || '' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./build/client"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Configure custom domain and enforce HTTPS
        if: steps.check-custom-domain.outputs.has_custom_domain == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TEMPLATE_PAT || github.token }}
          script: |
            const cname = '${{ steps.check-custom-domain.outputs.domain }}';
            try {
              await github.rest.repos.updateInformationAboutPagesSite({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cname: cname,
                https_enforced: true
              });
              console.log(`✅ Configured custom domain: ${cname} with HTTPS enforcement`);
            } catch (error) {
              console.log(`Note: ${error.message}`);
            }
