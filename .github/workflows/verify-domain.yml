name: Verify Custom Domain & SSL

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read CNAME
        id: read-cname
        run: |
          if [ -f "CNAME" ]; then
            DOMAIN=$(cat CNAME | tr -d '[:space:]')
            echo "domain=${DOMAIN}" >> $GITHUB_OUTPUT
            echo "has_domain=true" >> $GITHUB_OUTPUT
            echo "Custom domain configured: ${DOMAIN}"
          else
            echo "has_domain=false" >> $GITHUB_OUTPUT
            echo "No CNAME file found in repository"
          fi

      - name: Check DNS resolution
        if: steps.read-cname.outputs.has_domain == 'true'
        run: |
          DOMAIN="${{ steps.read-cname.outputs.domain }}"
          echo "=================================================="
          echo " Domain Verification Report for: ${DOMAIN}"
          echo "=================================================="
          echo ""

          # Check A and CNAME records
          if command -v dig >/dev/null 2>&1; then
            A_RECORDS=$(dig +short "${DOMAIN}" A 2>/dev/null)
            CNAME_TARGET=$(dig +short "${DOMAIN}" CNAME 2>/dev/null | sed 's/\.$//')
          else
            A_RECORDS=$(nslookup "${DOMAIN}" 2>/dev/null | grep 'Address:' | tail -n +2 | awk '{print $2}')
            CNAME_TARGET=""
          fi

          echo "A records for ${DOMAIN}:"
          if [ -n "$A_RECORDS" ]; then
            echo "$A_RECORDS"
          else
            echo "  (none)"
          fi

          echo ""
          echo "CNAME record for ${DOMAIN}:"
          if [ -n "$CNAME_TARGET" ]; then
            echo "  ${CNAME_TARGET}"
          else
            echo "  (none)"
          fi

          # Evaluate DNS
          GITHUB_PAGES_IPS="185.199.108.153 185.199.109.153 185.199.110.153 185.199.111.153"
          DNS_OK=false

          for ip in $A_RECORDS; do
            for ghip in $GITHUB_PAGES_IPS; do
              if [ "$ip" = "$ghip" ]; then DNS_OK=true; fi
            done
          done

          if [ "$CNAME_TARGET" = "xsunn3.github.io" ]; then DNS_OK=true; fi

          echo ""
          echo "=================================================="
          if [ "$DNS_OK" = "true" ]; then
            echo "✅ DNS PASS: ${DOMAIN} is correctly pointing to GitHub Pages"
          else
            echo "❌ DNS FAIL: ${DOMAIN} is NOT pointing to GitHub Pages"
            echo ""
            echo "  This is why you see ERR_CERT_COMMON_NAME_INVALID."
            echo "  GitHub Pages cannot provision an SSL certificate for"
            echo "  ${DOMAIN} until its DNS points here."
            echo ""
            echo "  ── ACTION REQUIRED ─────────────────────────────"
            echo "  At your domain registrar, add this DNS record:"
            echo ""
            echo "    Type : CNAME"
            echo "    Name : trade"
            echo "    Value: xsunn3.github.io"
            echo "    TTL  : 3600 (or Automatic)"
            echo ""
            echo "  After adding the record, DNS propagation can take"
            echo "  up to 24 hours. Once propagated, GitHub Pages will"
            echo "  automatically provision an SSL certificate."
            echo "  ─────────────────────────────────────────────────"
            echo "=================================================="
            exit 1
          fi
          echo "=================================================="

      - name: Check GitHub Pages settings
        if: steps.read-cname.outputs.has_domain == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TEMPLATE_PAT || github.token }}
          script: |
            const domain = '${{ steps.read-cname.outputs.domain }}';
            try {
              const pages = await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              const data = pages.data;
              const certState = data.https_certificate ? data.https_certificate.state : 'unknown';
              console.log('');
              console.log('GitHub Pages settings:');
              console.log(`  URL           : ${data.html_url}`);
              console.log(`  Custom domain : ${data.cname || '(not set)'}`);
              console.log(`  HTTPS enforced: ${data.https_enforced}`);
              console.log(`  HTTPS cert    : ${certState}`);
              console.log('');
              if (!data.cname) {
                console.log('⚠️  Custom domain is not set in GitHub Pages settings.');
                console.log('   Run the Deploy workflow to set it automatically, or');
                console.log('   set it manually under Settings → Pages → Custom domain.');
              } else if (data.cname !== domain) {
                console.log(`⚠️  Custom domain mismatch: Pages has "${data.cname}", CNAME file has "${domain}"`);
              } else {
                console.log(`✅ Custom domain "${domain}" is correctly set in GitHub Pages.`);
              }
              if (certState !== 'approved') {
                // HTTPS enforcement must NOT be enabled while the cert is not approved.
                // Enforcing HTTPS with an unapproved cert causes ERR_CERT_COMMON_NAME_INVALID
                // and, combined with HSTS, locks browsers out of the domain entirely.
                if (data.https_enforced) {
                  console.log('');
                  console.log('❌ HTTPS enforcement is ENABLED but the SSL certificate is NOT approved.');
                  console.log(`   Certificate state: ${certState}`);
                  console.log('   This causes ERR_CERT_COMMON_NAME_INVALID (and HSTS lockout) in browsers.');
                  console.log('');
                  console.log('   ── ACTION REQUIRED ─────────────────────────────');
                  console.log('   1. Go to GitHub → Settings → Pages');
                  console.log('   2. UNCHECK "Enforce HTTPS" until the certificate is approved.');
                  console.log('   3. Confirm the DNS CNAME record exists:');
                  const cnameHost  = domain.split('.')[0];                  // e.g. "trade"
                  const cnameValue = `${context.repo.owner}.github.io`;    // e.g. "xsunn3.github.io"
                  console.log(`        Type : CNAME`);
                  console.log(`        Name : ${cnameHost}`);
                  console.log(`        Value: ${cnameValue}`);
                  console.log('   4. Wait for DNS propagation (up to 24 hours).');
                  console.log('   5. Re-run the Deploy workflow once the certificate shows "approved".');
                  console.log('   ─────────────────────────────────────────────────');
                  core.setFailed('HTTPS is enforced but SSL cert is not approved — this causes ERR_CERT_COMMON_NAME_INVALID. Disable "Enforce HTTPS" in Settings → Pages until the certificate is approved.');
                } else {
                  console.log(`⚠️  SSL certificate state: ${certState}`);
                  console.log('   The certificate is still being provisioned or has an error.');
                  console.log('   Confirm DNS is set and wait up to 24 hours, then re-run the Deploy workflow.');
                }
              } else {
                console.log('✅ SSL certificate is approved and active.');
                if (!data.https_enforced) {
                  console.log('⚠️  HTTPS enforcement is disabled. Re-run the Deploy workflow to enable it.');
                } else {
                  console.log('✅ HTTPS enforcement is enabled.');
                }
              }
            } catch (error) {
              if (error.status === 404) {
                console.log('❌ GitHub Pages is not enabled for this repository.');
                console.log('   Go to Settings → Pages and set the source to "GitHub Actions".');
              } else {
                console.log(`Error: ${error.message}`);
              }
            }
